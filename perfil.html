<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASSA Rastreo - Mi Perfil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f8faf7] font-sans pb-24 selection:bg-[#6b9e1a] selection:text-white"> 

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative shadow-2xl bg-gray-50 overflow-hidden">
        
        <div class="bg-[#001b71] pt-10 pb-20 px-6 rounded-b-[3rem] shadow-md relative">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-[#6b9e1a] rounded-full blur-3xl opacity-30"></div>
            <h1 class="text-2xl font-bold text-white text-center tracking-wide">Mi Perfil</h1>
        </div>

        <div class="px-6 -mt-14 relative z-10 mb-6">
            <div class="bg-white rounded-3xl p-6 shadow-lg border border-gray-100 flex flex-col items-center text-center">
                <div class="w-24 h-24 bg-[#e2e8f0] rounded-full border-4 border-white shadow-md overflow-hidden -mt-16 mb-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Josea&backgroundColor=e2e8f0" alt="Foto de perfil" class="w-full h-full object-cover">
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Jose Angel</h2>
                <p class="text-sm font-semibold text-[#6b9e1a] uppercase tracking-wider mt-1">Repartidor Activo</p>
                <div class="flex items-center gap-2 mt-3 text-sm text-gray-500 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200">
                    <i class="fa-solid fa-id-badge text-gray-400"></i> ID: EMP-4092
                </div>
            </div>
        </div>

        <div class="px-5 mb-6">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 ml-2">Asignación Actual</h3>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="w-12 h-12 bg-[#001b71]/10 text-[#001b71] rounded-xl flex items-center justify-center text-xl flex-shrink-0">
                    <i class="fa-solid fa-motorcycle"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800">Motocicleta Honda Cargo</h4>
                    <p class="text-sm text-gray-500">Placas: <span class="font-semibold">VFG-912</span></p>
                </div>
                <div class="w-3 h-3 bg-[#6b9e1a] rounded-full shadow-[0_0_8px_rgba(107,158,26,0.6)]"></div>
            </div>
        </div>

        <div class="px-5 flex-1">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 ml-2">Configuración</h3>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <button class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-50">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-headset text-gray-400 text-lg w-6 text-center"></i>
                        <span class="font-semibold text-gray-700">Soporte y Ayuda</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>
                <button class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-shield-halved text-gray-400 text-lg w-6 text-center"></i>
                        <span class="font-semibold text-gray-700">Políticas de Privacidad</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>
            </div>

            <button onclick="abrirModalSalida()" class="w-full mt-6 bg-red-50 text-red-600 hover:bg-red-100 font-bold py-4 px-6 rounded-2xl transition-all duration-300 flex justify-center items-center text-lg active:scale-[0.98] border border-red-100">
                <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Cerrar Sesión
            </button>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex p-2 pb-6 z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] rounded-t-[2rem]">
            <a href="lista_pedidos.html" class="flex-1 flex flex-col items-center justify-center p-2 text-gray-400 hover:text-[#001b71] transition group">
                <div class="w-12 h-8 flex items-center justify-center rounded-full mb-1 group-hover:bg-[#001b71]/5 transition-colors">
                    <i class="fa-solid fa-list-ul text-lg"></i>
                </div>
                <span class="text-[11px] font-bold">Rutas</span>
            </a>
            <div class="flex-1 flex flex-col items-center justify-center p-2 text-[#001b71] cursor-default">
                <div class="bg-[#001b71]/10 w-12 h-8 flex items-center justify-center rounded-full mb-1">
                    <i class="fa-solid fa-user text-lg"></i>
                </div>
                <span class="text-[11px] font-bold">Perfil</span>
            </div>
        </div>

        <div id="modal-logout" class="fixed inset-0 bg-black/50 z-50 hidden flex-col justify-center items-center backdrop-blur-sm transition-opacity opacity-0 duration-300">
            <div id="modal-content" class="bg-white w-10/12 max-w-sm rounded-3xl p-6 shadow-2xl scale-95 transition-transform duration-300">
                
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl border border-red-100">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </div>
                
                <h3 class="text-2xl font-bold text-gray-800 text-center mb-2">¿Cerrar Sesión?</h3>
                <p class="text-gray-500 text-center text-sm mb-6 leading-relaxed">
                    Tu turno se pausará y tendrás que volver a ingresar tu correo y contraseña para ver tus rutas.
                </p>
                
                <div class="flex gap-3">
                    <button onclick="cerrarModalSalida()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3.5 rounded-xl hover:bg-gray-200 transition-colors active:scale-95">
                        Cancelar
                    </button>
                    <button onclick="confirmarSalida()" class="flex-1 bg-red-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-red-500/30 hover:bg-red-600 transition-colors active:scale-95">
                        Sí, salir
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const modal = document.getElementById('modal-logout');
        const modalContent = document.getElementById('modal-content');

        function abrirModalSalida() {
            // Mostrar el contenedor oscuro
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Animación suave de entrada (Fade in y zoom in)
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function cerrarModalSalida() {
            // Animación suave de salida (Fade out y zoom out)
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            // Esperar a que termine la animación para ocultarlo completamente
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function confirmarSalida() {
            // El usuario confirmó, lo mandamos al Login
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
